<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>기업 제휴 안내문 | 민병철유폰</title>
<meta name="description" content="민병철유폰 기업 제휴 안내문(PC·모바일)을 다운로드하실 수 있습니다." />
<meta property="og:title" content="기업 제휴 안내문 | 민병철유폰" />
<meta property="og:description" content="이번 달 기업 제휴 안내문을 확인해 보세요." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Roboto:wght@400;500;700&display=swap" />

<script>
/* ============================================================
   ★ 매달 여기만 수정하세요 ★
   ------------------------------------------------------------
   MONTH   : 안내문 월 (숫자만) — 제목·버튼·저장 파일명에 자동 반영
   PDF_PC  : PC 버전 안내문 경로 (files 폴더의 실제 파일명과 일치)
   PDF_MO  : 모바일 버전 안내문 경로
   PHONE   : 제휴 문의 전화번호
   CHAT_URL: 채널톡 상담 링크 ("" 이면 링크 숨김)
   ============================================================ */
const CONFIG = {
  MONTH: 7,
  PDF_PC: "./files/2026-07_기업제휴_안내문_PC.png",
  PDF_MO: "./files/2026-07_기업제휴_안내문_MO.png",
  PHONE: "02-6956-0509",
  CHAT_URL: ""
};
</script>

<style>
  :root{
    --purple:#9732FC;
    --red:#FC4C4C;
    --ink:#111111;
    --gray:#555555;
    --gray-light:#999999;
    --line:#EEEEEE;
    --grad:linear-gradient(90deg,#9732FC 0%,#FC4C4C 100%);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Noto Sans KR","Roboto",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    letter-spacing:-.02em;background:#fff;color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;line-height:1.6;
  }
  a{color:inherit;text-decoration:none}

  /* ===== header ===== */
  header{background:rgba(255,255,255,.96);border-bottom:1px solid var(--line)}
  .nav{max-width:1000px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
  .nav img{height:22px;display:block}
  .nav span{font-size:13px;color:var(--gray-light)}

  /* ===== hero ===== */
  main{
    flex:1;display:flex;align-items:center;justify-content:center;
    background:#fff url("./assets/bg-pc.jpg") no-repeat center top;
    background-size:cover;
    padding:80px 24px 96px;
  }
  .hero{max-width:680px;width:100%;text-align:center}
  .badge{
    display:inline-block;padding:6px 14px;border-radius:60px;
    border:1px solid var(--purple);color:var(--purple);
    font-size:12px;font-weight:500;white-space:nowrap;
  }
  h1{
    margin:18px 0 14px;font-size:52px;font-weight:900;color:var(--ink);
    line-height:1.18;letter-spacing:-.024em;text-wrap:balance;word-break:keep-all;
  }
  .sub{
    margin:0 auto;max-width:520px;font-size:17px;line-height:1.65;
    color:var(--gray);word-break:keep-all;text-wrap:pretty;
  }

  /* ===== download card ===== */
  .dl-card{
    margin:40px auto 0;max-width:560px;background:#fff;
    border:1px solid var(--line);border-radius:20px;
    box-shadow:0 16px 40px rgba(0,0,0,.12);
    padding:12px;display:flex;flex-direction:column;gap:4px;text-align:left;
  }
  .dl-divider{height:1px;background:var(--line);margin:0 16px}
  .dl-item{
    display:flex;align-items:center;gap:16px;
    padding:18px 16px;border-radius:14px;transition:background .15s ease;
  }
  .dl-item:hover{background:#FAFAFA}
  .chip{
    flex:0 0 auto;width:46px;height:46px;border-radius:12px;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;
  }
  .chip.pc{background:#f4e8ff;color:var(--purple)}
  .chip.mo{background:#ffecec;color:var(--red)}
  .dl-text{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
  .dl-text strong{font-size:17px;font-weight:700;color:var(--ink)}
  .dl-text em{font-style:normal;font-size:13px;color:var(--gray-light)}
  .btn{
    flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 22px;border-radius:0 10px 10px 10px;
    background:var(--grad);color:#fff;font-size:15px;font-weight:700;
    box-shadow:0 12px 28px rgba(151,50,252,.28);
    transition:filter .15s ease;
  }
  .btn:hover,.btn:focus-visible{filter:brightness(.95)}
  .btn svg{flex:none}

  /* ===== contact / footer ===== */
  .contact{margin:26px 0 0;font-size:14px;color:var(--gray)}
  .contact a.tel{color:var(--ink);font-weight:700}
  .contact a.chat{color:var(--purple);font-weight:500}
  footer{background:var(--ink);padding:20px 24px;text-align:center}
  footer span{font-size:12px;color:var(--gray-light)}

  :focus-visible{outline:3px solid var(--purple);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){
    .dl-item,.btn{transition:none}
  }

  /* ===== mobile (디자인 1b) ===== */
  @media (max-width:767px){
    .nav{padding:14px 20px}
    .nav img{height:18px}
    .nav span{font-size:11px}
    main{
      align-items:flex-start;
      background-image:url("./assets/bg-mo.jpg");
      padding:44px 20px 56px;
    }
    .badge{padding:5px 12px;font-size:11px}
    h1{margin:14px 0 10px;font-size:30px;line-height:1.25}
    .sub{font-size:14px}
    /* 카드 컨테이너 → 개별 카드 2장으로 분리 */
    .dl-card{
      margin-top:28px;background:none;border:none;box-shadow:none;
      padding:0;gap:12px;
    }
    .dl-divider{display:none}
    .dl-item{
      flex-wrap:wrap;gap:14px;
      background:#fff;border:1px solid var(--line);border-radius:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);padding:18px 16px;
    }
    .dl-item:hover{background:#fff}
    .chip{width:40px;height:40px;border-radius:10px;font-size:11px}
    .dl-text{gap:2px}
    .dl-text strong{font-size:15px}
    .dl-text em{font-size:12px}
    .btn{width:100%;height:48px;padding:0}
    .contact{margin-top:24px;font-size:13px}
    footer{padding:16px 20px}
    footer span{font-size:11px}
  }
</style>
</head>
<body>

<header>
  <div class="nav">
    <img src="./assets/logo.svg" alt="민병철유폰" />
    <span class="nav-note">민병철교육그룹 · B2B 제휴</span>
  </div>
</header>

<main>
  <div class="hero">
    <span class="badge">B2B 제휴 안내</span>
    <h1><span id="monthText"></span> 기업 제휴 안내문</h1>
    <p class="sub">11년 연속 한국 소비자선호도 1위, 민병철유폰의 기업 제휴 프로그램을 소개합니다.<br class="pc-br" />임직원 영어회화 교육과 제휴 조건의 상세 내용은 아래 안내문에서 확인하세요.</p>

    <div class="dl-card">
      <a class="dl-item" id="dlPc" href="#" download>
        <span class="chip pc">PDF</span>
        <span class="dl-text">
          <strong><span class="m-label"></span> 기업 제휴 안내문 · PC버전</strong>
          <em>PDF · PC 화면 배포용</em>
        </span>
        <span class="btn">
          다운로드
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1v8m0 0L3.5 5.5M7 9l3.5-3.5M1.5 12.5h11" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </a>
      <div class="dl-divider"></div>
      <a class="dl-item" id="dlMo" href="#" download>
        <span class="chip mo">PDF</span>
        <span class="dl-text">
          <strong><span class="m-label"></span> 기업 제휴 안내문 · MO버전</strong>
          <em>PDF · 모바일 화면 배포용</em>
        </span>
        <span class="btn">
          다운로드
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 1v8m0 0L3.5 5.5M7 9l3.5-3.5M1.5 12.5h11" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </a>
    </div>

    <p class="contact">
      제휴 문의&nbsp; <a class="tel" id="telLink" href="#"></a>
      <span id="chatWrap" style="display:none">&nbsp;·&nbsp; <a class="chat" id="chatLink" href="#" target="_blank" rel="noopener">채널톡 상담</a></span>
    </p>
  </div>
</main>

<footer>
  <span>© 민병철교육그룹 · 11년 연속 한국 소비자선호도 1위</span>
</footer>

<script>
  // ===== CONFIG 반영 =====
  var m = CONFIG.MONTH + "월";
  document.getElementById("monthText").textContent = m;
  document.querySelectorAll(".m-label").forEach(function(el){ el.textContent = m; });
  document.title = "유폰 " + m + " 기업 제휴 안내문 | 민병철유폰";

  var dlPc = document.getElementById("dlPc");
  var dlMo = document.getElementById("dlMo");
  dlPc.href = CONFIG.PDF_PC;
  dlPc.setAttribute("download", "유폰_" + m + "_기업제휴_안내문_PC.pdf");
  dlMo.href = CONFIG.PDF_MO;
  dlMo.setAttribute("download", "유폰_" + m + "_기업제휴_안내문_MO.pdf");

  var tel = document.getElementById("telLink");
  tel.textContent = CONFIG.PHONE;
  tel.href = "tel:" + CONFIG.PHONE.replace(/-/g, "");

  if (CONFIG.CHAT_URL) {
    document.getElementById("chatWrap").style.display = "";
    document.getElementById("chatLink").href = CONFIG.CHAT_URL;
  }

  // ===== GA4 다운로드 이벤트 (gtag 설치 시 자동 동작) =====
  [dlPc, dlMo].forEach(function(el){
    el.addEventListener("click", function(){
      if (typeof gtag === "function") {
        gtag("event", "file_download", {
          file_name: el.href.split("/").pop(),
          version: el === dlPc ? "PC" : "MO",
          month: CONFIG.MONTH
        });
      }
    });
  });
</script>
<!--
  GA4 추적이 필요하면 아래 스니펫의 G-XXXXXXX를 측정 ID로 바꿔 <head>에 넣으세요.
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXX');
  </script>
-->
</body>
</html>
